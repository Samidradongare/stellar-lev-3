name: PuneFinder CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # ── Job 1: Soroban Contract Build & Test ──────────────────────────────────
  contract:
    name: Rust / Soroban Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Build Soroban WASM
        working-directory: ./contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Run Contract Tests
        working-directory: ./contracts
        run: cargo test -- --nocapture

  # ── Job 2: Frontend Build & Test ─────────────────────────────────────────
  frontend:
    name: Next.js Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run Frontend Tests
        working-directory: ./frontend
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build Next.js App
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_LOST_AND_FOUND_ADDRESS: ${{ secrets.NEXT_PUBLIC_LOST_AND_FOUND_ADDRESS }}
        run: npm run build
        working-directory: ./frontend